<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelp Forest Run</title>
    <style>
        body {
            margin: 0;
            background: #001219;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #94d2bd;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(to bottom, #005f73, #0a192f);
            border: 5px solid #00334e;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="scoreBoard">Score: 0</h1>
        <p id="status">A / D to Swim • Dodge the Kelp!</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('scoreBoard');
    const status = document.getElementById('status');

    canvas.width = 450;
    canvas.height = 650;

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let frames = 0;
    let keys = {};

    // Background Bubbles
    const bubbles = Array.from({ length: 15 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 5 + 2,
        speed: Math.random() * 1 + 0.5
    }));

    const fish = {
        x: canvas.width / 2 - 15,
        y: canvas.height - 80,
        width: 34,
        height: 40,
        speed: 8,
        draw() {
            ctx.save();
            ctx.translate(this.x + 17, this.y + 20);
            
            // Fish Body (Teardrop shape)
            ctx.fillStyle = '#ffb703';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.quadraticCurveTo(15, 0, 0, 20);
            ctx.quadraticCurveTo(-15, 0, 0, -20);
            ctx.fill();

            // Tail Fin
            ctx.fillStyle = '#fb8500';
            ctx.beginPath();
            ctx.moveTo(0, 15);
            ctx.lineTo(-12, 30);
            ctx.lineTo(12, 30);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(0, -10, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(0, -11, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        },
        move() {
            if ((keys['KeyA'] || keys['ArrowLeft']) && this.x > 0) this.x -= this.speed;
            if ((keys['KeyD'] || keys['ArrowRight']) && this.x < canvas.width - this.width) this.x += this.speed;
        }
    };

    const obstacles = [];

    class Kelp {
        constructor() {
            this.width = Math.random() * 40 + 30;
            this.height = Math.random() * 100 + 50;
            this.x = Math.random() * (canvas.width - this.width);
            this.y = -this.height - 20;
            this.sway = Math.random() * 10;
        }
        draw() {
            ctx.fillStyle = '#2d6a4f';
            ctx.strokeStyle = '#1b4332';
            ctx.lineWidth = 3;
            
            // Draw a leafy/jagged seaweed shape
            ctx.beginPath();
            ctx.moveTo(this.x + this.width/2, this.y);
            ctx.quadraticCurveTo(this.x - 10, this.y + this.height/2, this.x + this.width/2, this.y + this.height);
            ctx.quadraticCurveTo(this.x + this.width + 10, this.y + this.height/2, this.x + this.width/2, this.y);
            ctx.fill();
            ctx.stroke();

            // Interior detail lines
            ctx.beginPath();
            ctx.moveTo(this.x + this.width/2, this.y + 5);
            ctx.lineTo(this.x + this.width/2, this.y + this.height - 5);
            ctx.stroke();
        }
        update() {
            this.y += gameSpeed;
        }
    }

    function drawBubbles() {
        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        bubbles.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fill();
            b.y -= b.speed;
            if (b.y < -10) b.y = canvas.height + 10;
        });
    }

    function handleObstacles() {
        let spawnRate = Math.max(8, 30 - Math.floor(gameSpeed * 1.5));
        if (frames % spawnRate === 0) {
            obstacles.push(new Kelp());
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();

            // Hitbox (slightly smaller than visual for fairness)
            if (
                fish.x + 5 < obstacles[i].x + obstacles[i].width &&
                fish.x + fish.width - 5 > obstacles[i].x &&
                fish.y + 5 < obstacles[i].y + obstacles[i].height &&
                fish.y + fish.height - 5 > obstacles[i].y
            ) {
                gameOver();
            }

            if (obstacles[i].y > canvas.height) {
                obstacles.splice(i, 1);
                score++;
                gameSpeed += 0.08; // Ramping up fast!
            }
        }
    }

    function gameOver() {
        isGameOver = true;
        status.innerHTML = "<span style='color:#ae2012; font-size: 24px;'>TANGLED IN KELP!</span><br>Press 'R' to Respawn";
    }

    function reset() {
        score = 0;
        gameSpeed = 5;
        obstacles.length = 0;
        fish.x = canvas.width / 2 - 15;
        isGameOver = false;
        status.innerHTML = "A / D to Swim • Dodge the Kelp!";
        animate();
    }

    function animate() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBubbles();
        fish.move();
        fish.draw();
        handleObstacles();

        scoreBoard.innerText = `Score: ${score} | Speed: ${gameSpeed.toFixed(1)}`;
        frames++;
        requestAnimationFrame(animate);
    }

    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'KeyR' && isGameOver) reset();
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    animate();
</script>
</body>
</html>
