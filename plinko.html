<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLINKO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --bg: #000000;
    --fg: #ffffff;
    --accent: #ffd700;
    --green: #00ff88;
    --red: #ff4444;
    --dim: #444444;
    --panel: #0a0a0a;
    --border: #222222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .title-section {
    text-align: center;
  }

  .nova-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: #ff69b4;
    text-shadow: 0 0 20px rgba(255,105,180,0.4);
    margin: 12px 0 4px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(255,215,0,0.4);
    margin: 0 0 8px;
  }

  .main-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
    padding: 0 12px 24px;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 220px;
    flex-shrink: 0;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .balance-display {
    font-size: 1.6rem;
    font-family: 'Bebas Neue', sans-serif;
    color: var(--green);
    letter-spacing: 0.1em;
  }

  .balance-sub { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }

  .bet-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 8px 0;
  }

  .bet-input {
    background: #111;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 6px 8px;
    width: 100%;
    border-radius: 3px;
    outline: none;
  }
  .bet-input:focus { border-color: var(--accent); }

  .quick-bets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 8px;
  }

  .btn {
    background: #111;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.1s;
    text-align: center;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.96); }

  .btn-modifier-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
    margin-bottom: 10px;
  }

  .drop-btn {
    width: 100%;
    padding: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .drop-btn:hover { background: #ffe44d; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
  .drop-btn:active { transform: scale(0.97); }
  .drop-btn:disabled { background: var(--dim); color: #888; cursor: not-allowed; box-shadow: none; }

  .auto-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .toggle {
    width: 36px; height: 18px;
    background: var(--dim);
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 20px; }

  /* Rows slider */
  .slider-row { display: flex; align-items: center; gap: 8px; }
  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .slider-val { min-width: 24px; text-align: right; color: var(--accent); }

  /* Stats */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .stat-item { }
  .stat-label { font-size: 0.6rem; color: var(--dim); }
  .stat-value { font-size: 0.95rem; color: var(--fg); }

  /* History */
  .history-list {
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid #111;
    font-size: 0.7rem;
  }
  .hist-mult { color: var(--accent); }
  .hist-win { color: var(--green); }
  .hist-loss { color: var(--red); }

  /* ── CANVAS ── */
  .canvas-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    display: block;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .mult-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mult-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 6px;
    border-radius: 3px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    font-size: 0.72rem;
  }
  .mult-bar-wrap { flex: 1; margin: 0 6px; height: 3px; background: #1a1a1a; border-radius: 2px; }
  .mult-bar { height: 100%; border-radius: 2px; }

  .sound-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

  .vol-slider { accent-color: var(--accent); flex: 1; }

  /* Notification toast */
  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #111;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.2em;
    padding: 10px 28px;
    border-radius: 4px;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="title-section">
  <div class="nova-header">NOVA CONSILIA GAMES</div>
  <h1>P L I N K O</h1>
</div>

<div id="toast">+0</div>

<div class="main-layout">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <div class="panel">
      <div class="panel-title">BALANCE</div>
      <div class="balance-display" id="balanceDisplay">1,000</div>
      <div class="balance-sub">VIRTUAL COINS · NO REAL VALUE</div>
    </div>

    <div class="panel">
      <div class="panel-title">BET AMOUNT</div>
      <div class="bet-input-row">
        <input class="bet-input" type="number" id="betInput" value="10" min="1" />
      </div>
      <div class="quick-bets">
        <button class="btn" onclick="setBet(10)">10</button>
        <button class="btn" onclick="setBet(50)">50</button>
        <button class="btn" onclick="setBet(100)">100</button>
        <button class="btn" onclick="setBet(500)">500</button>
      </div>
      <div class="btn-modifier-row">
        <button class="btn" onclick="modBet(0.5)">½×</button>
        <button class="btn" onclick="modBet(2)">2×</button>
        <button class="btn" onclick="setBetMax()">MAX</button>
      </div>
      <button class="drop-btn" id="dropBtn" onclick="dropBall()">▼ DROP</button>
      <div class="auto-row">
        <div class="toggle" id="autoToggle" onclick="toggleAuto()"></div>
        <span style="font-size:0.75rem;color:var(--dim)">AUTO DROP</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">PEG ROWS</div>
      <div class="slider-row">
        <input type="range" id="rowsSlider" min="8" max="16" value="16" oninput="onRowsChange()">
        <span class="slider-val" id="rowsVal">16</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">SOUND</div>
      <div class="sound-row">
        <div class="toggle on" id="soundToggle" onclick="toggleSound()"></div>
        <span style="font-size:0.75rem;color:var(--dim)">PEG HITS</span>
      </div>
      <div class="sound-row" style="margin-top:8px">
        <span style="font-size:0.65rem;color:var(--dim)">VOL</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="60" oninput="updateVol()">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">SESSION STATS</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-label">DROPS</div><div class="stat-value" id="statDrops">0</div></div>
        <div class="stat-item"><div class="stat-label">WIN RATE</div><div class="stat-value" id="statWinRate">0%</div></div>
        <div class="stat-item"><div class="stat-label">BEST MULT</div><div class="stat-value" id="statBest">—</div></div>
        <div class="stat-item"><div class="stat-label">NET P/L</div><div class="stat-value" id="statPL">0</div></div>
      </div>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <canvas id="plinkoCanvas"></canvas>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="panel">
      <div class="panel-title">MULTIPLIERS</div>
      <div class="mult-list" id="multList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">LAST DROPS</div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

</div>

<script>
// ─── AUDIO ENGINE ────────────────────────────────────────────────
let audioCtx = null;
let soundEnabled = true;
let volume = 0.6;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playPegHit(intensity = 1.0) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    // Soft tick — short sine burst
    const freq = 600 + Math.random() * 400;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(volume * 0.25 * intensity, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  } catch(e) {}
}

function playSlotSound(mult) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const isWin = mult > 1;
    // Chord jingle
    const freqs = isWin ? [523, 659, 784, 1047] : [220, 196, 165, 130];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = isWin ? 'triangle' : 'sawtooth';
      osc.frequency.value = f;
      const t = ctx.currentTime + i * 0.06;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(volume * 0.15, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.3);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').classList.toggle('on', soundEnabled);
}
function updateVol() {
  volume = document.getElementById('volSlider').value / 100;
}

// ─── GAME STATE ───────────────────────────────────────────────────
let balance = 1000;
let betAmount = 10;
let risk = 'low'; // LOCKED TO LOW RISK
let numRows = 16;
let autoMode = false;
let autoTimer = null;
let activeBalls = [];
let history = [];
let stats = { drops: 0, wins: 0, bestMult: 0, netPL: 0 };

// ─── MULTIPLIER TABLES ───────────────────────────────────────────
// These are used for DISPLAY only — actual payout is slot index based
const MULT_TABLES = {
  low:  [100, 10, 5, 3, 2, 1.5, 1, 0.3, 0.3, 1, 1.5, 2, 3, 5, 10, 100],
  med:  [150, 20, 10, 5, 3, 2, 1, 0.5, 0.5, 1, 2, 3, 5, 10, 20, 150],
  high: [500, 50, 20, 10, 5, 3, 2, 0.5, 0.5, 2, 3, 5, 10, 20, 50, 500],
};

// ─── CANVAS SETUP ────────────────────────────────────────────────
const canvas = document.getElementById('plinkoCanvas');
const ctx2 = canvas.getContext('2d');

const CANVAS_W = 620;
const CANVAS_H = 680;
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// ─── PEG LAYOUT ──────────────────────────────────────────────────
// Match the image exactly:
// Row i (0-indexed) has (i + 3) pegs
// Rows are evenly spaced vertically
// Each row is centered and pegs are horizontally offset between rows (standard Plinko triangular lattice)

let pegs = [];
let slots = [];
let slotRects = [];

function buildPegs() {
  pegs = [];
  slots = [];
  slotRects = [];

  const rows = numRows; // e.g. 16
  const topPad = 60;
  const bottomPad = 100;
  const availH = CANVAS_H - topPad - bottomPad;
  const rowSpacing = availH / (rows); // vertical gap between peg rows

  // Max pegs in last row = rows + 2 (row 0 has 3, row rows-1 has rows+2)
  const maxPegs = rows + 2;
  const pegSpacing = (CANVAS_W - 80) / (maxPegs - 1); // horizontal spacing

  for (let r = 0; r < rows; r++) {
    const numPegsInRow = r + 3;
    const y = topPad + r * rowSpacing;
    // Center the row
    const totalWidth = (numPegsInRow - 1) * pegSpacing;
    const startX = (CANVAS_W - totalWidth) / 2;
    for (let p = 0; p < numPegsInRow; p++) {
      pegs.push({ x: startX + p * pegSpacing, y: y, r: 4 });
    }
  }

  // Slot positions: slots appear between and outside the last row pegs
  // Number of slots = maxPegs + 1
  const numSlots = maxPegs + 1;
  const lastRowPegs = rows + 2;
  const lastRowTotal = (lastRowPegs - 1) * pegSpacing;
  const lastRowStart = (CANVAS_W - lastRowTotal) / 2;
  const slotY = CANVAS_H - bottomPad + 4;
  const slotH = bottomPad - 8;

  // Slot centers: at and between last-row pegs, plus outside edges
  const lastRowY = topPad + (rows - 1) * rowSpacing;
  const slotMults = MULT_TABLES[risk];

  // Evenly divide the bottom area into numSlots
  const slotW = CANVAS_W / numSlots;
  for (let s = 0; s < numSlots; s++) {
    const cx = slotW * s + slotW / 2;
    slotRects.push({ x: slotW * s, y: slotY, w: slotW, h: slotH, cx });
    slots.push(cx);
  }
}

// ─── BALL PHYSICS ────────────────────────────────────────────────
const GRAVITY = 0.38;
const FRICTION = 0.985;
const BALL_R = 7;
const CENTER_BIAS = 0.72; // 0..1; higher = more center bias

class Ball {
  constructor(bet) {
    this.x = CANVAS_W / 2 + (Math.random() - 0.5) * 6;
    this.y = 20;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = 1;
    this.bet = bet;
    this.trail = [];
    this.done = false;
    this.lastPegHit = -1;
    this.pegHitCooldown = {};
    this.color = `hsl(${Math.random() * 60 + 30}, 100%, 65%)`; // gold range
  }

  update() {
    if (this.done) return;

    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 14) this.trail.shift();

    this.vy += GRAVITY;
    this.vx *= FRICTION;
    this.x += this.vx;
    this.y += this.vy;

    // Wall bounce
    if (this.x < BALL_R) { this.x = BALL_R; this.vx = Math.abs(this.vx) * 0.6; }
    if (this.x > CANVAS_W - BALL_R) { this.x = CANVAS_W - BALL_R; this.vx = -Math.abs(this.vx) * 0.6; }

    // Peg collision
    for (let i = 0; i < pegs.length; i++) {
      const peg = pegs[i];
      const dx = this.x - peg.x;
      const dy = this.y - peg.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = BALL_R + peg.r;

      if (dist < minDist && !this.pegHitCooldown[i]) {
        // Push out
        const nx = dx / dist;
        const ny = dy / dist;
        this.x = peg.x + nx * (minDist + 0.5);
        this.y = peg.y + ny * (minDist + 0.5);

        // Reflect velocity
        const dot = this.vx * nx + this.vy * ny;
        this.vx -= 2 * dot * nx;
        this.vy -= 2 * dot * ny;
        this.vy = Math.abs(this.vy) * 0.55; // bounce down
        this.vx *= 0.7;

        // ── CENTER BIAS ──────────────────────────────────────────
        // Strongly nudge horizontal velocity toward center
        const center = CANVAS_W / 2;
        const toCenter = center - this.x;
        // Apply strong center pull
        const biasStrength = CENTER_BIAS * 0.022;
        this.vx += toCenter * biasStrength;
        // Also add small random jitter to keep it natural
        this.vx += (Math.random() - 0.5) * 0.4;
        // ─────────────────────────────────────────────────────────

        // Sound — throttle per peg
        this.pegHitCooldown[i] = true;
        setTimeout(() => { delete this.pegHitCooldown[i]; }, 120);

        const intensity = Math.min(1, Math.sqrt(this.vx * this.vx + this.vy * this.vy) / 8);
        playPegHit(intensity);
      }
    }

    // Slot landing
    const slotBottom = CANVAS_H - 10;
    if (this.y >= slotBottom) {
      this.y = slotBottom;
      this.done = true;
      this.landSlot();
    }
  }

  landSlot() {
    // Find which slot we landed in
    const numSlots = MULT_TABLES[risk].length;
    const slotW = CANVAS_W / numSlots;
    const slotIdx = Math.max(0, Math.min(numSlots - 1, Math.floor(this.x / slotW)));
    const mult = MULT_TABLES[risk][slotIdx];
    const payout = Math.floor(this.bet * mult);
    const profit = payout - this.bet;

    balance += payout;
    stats.drops++;
    stats.netPL += profit;
    if (mult > 1) stats.wins++;
    if (mult > stats.bestMult) stats.bestMult = mult;

    // Slot flash
    this.flashSlot = slotIdx;
    this.flashMult = mult;
    setTimeout(() => { this.flashSlot = null; }, 600);

    // History
    history.unshift({ mult, profit });
    if (history.length > 20) history.pop();

    playSlotSound(mult);
    showToast(mult, profit);
    updateUI();
  }

  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const alpha = i / this.trail.length * 0.35;
      const r = BALL_R * (i / this.trail.length) * 0.7;
      ctx2.beginPath();
      ctx2.arc(this.trail[i].x, this.trail[i].y, r, 0, Math.PI * 2);
      ctx2.fillStyle = this.color.replace('65%)', `65%, ${alpha})`).replace('hsl', 'hsla');
      ctx2.fill();
    }
    // Ball
    ctx2.beginPath();
    ctx2.arc(this.x, this.y, BALL_R, 0, Math.PI * 2);
    const grad = ctx2.createRadialGradient(this.x - 2, this.y - 2, 1, this.x, this.y, BALL_R);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, this.color);
    grad.addColorStop(1, '#000');
    ctx2.fillStyle = grad;
    ctx2.fill();
  }
}

// ─── DRAW LOOP ───────────────────────────────────────────────────
let flashSlots = {}; // slotIdx -> { mult, timer }

function drawFrame() {
  ctx2.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Background subtle grid
  ctx2.strokeStyle = '#0c0c0c';
  ctx2.lineWidth = 0.5;
  for (let x = 0; x < CANVAS_W; x += 40) {
    ctx2.beginPath(); ctx2.moveTo(x, 0); ctx2.lineTo(x, CANVAS_H); ctx2.stroke();
  }
  for (let y = 0; y < CANVAS_H; y += 40) {
    ctx2.beginPath(); ctx2.moveTo(0, y); ctx2.lineTo(CANVAS_W, y); ctx2.stroke();
  }

  // Draw slots
  const numSlots = MULT_TABLES[risk].length;
  const slotW = CANVAS_W / numSlots;
  const slotY = CANVAS_H - 96;
  const slotH = 90;
  const slotMults = MULT_TABLES[risk];

  for (let s = 0; s < numSlots; s++) {
    const sx = s * slotW;
    const mult = slotMults[s];
    const isFlash = flashSlots[s] && flashSlots[s].active;

    // Color based on multiplier
    let col;
    if (mult >= 50) col = isFlash ? '#ff88ff' : '#dd00dd';
    else if (mult >= 10) col = isFlash ? '#ffaa44' : '#cc6600';
    else if (mult >= 3) col = isFlash ? '#ffee55' : '#aa8800';
    else if (mult >= 1.5) col = isFlash ? '#aaffaa' : '#006622';
    else col = isFlash ? '#4488ff' : '#003388';

    ctx2.fillStyle = col;
    ctx2.fillRect(sx + 1, slotY, slotW - 2, slotH);
    ctx2.strokeStyle = '#000';
    ctx2.lineWidth = 1;
    ctx2.strokeRect(sx + 1, slotY, slotW - 2, slotH);

    // Multiplier label
    ctx2.fillStyle = isFlash ? '#fff' : 'rgba(255,255,255,0.9)';
    ctx2.font = `bold ${mult >= 50 ? 9 : 10}px 'Share Tech Mono'`;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'middle';
    ctx2.fillText(`${mult}×`, sx + slotW / 2, slotY + slotH / 2);
  }

  // Draw pegs
  for (const peg of pegs) {
    ctx2.beginPath();
    ctx2.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
    ctx2.fillStyle = '#ffffff';
    ctx2.fill();
    // Subtle glow
    ctx2.beginPath();
    ctx2.arc(peg.x, peg.y, peg.r + 2, 0, Math.PI * 2);
    ctx2.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx2.lineWidth = 1.5;
    ctx2.stroke();
  }

  // Update & draw balls
  for (let i = activeBalls.length - 1; i >= 0; i--) {
    const ball = activeBalls[i];
    ball.update();
    ball.draw();
    if (ball.flashSlot !== undefined && ball.flashSlot !== null) {
      flashSlots[ball.flashSlot] = { active: true };
      setTimeout(() => { flashSlots[ball.flashSlot] = { active: false }; }, 400);
      ball.flashSlot = null;
    }
    if (ball.done && ball.trail.length === 0) {
      activeBalls.splice(i, 1);
    }
  }

  requestAnimationFrame(drawFrame);
}

// ─── CONTROL FUNCTIONS ───────────────────────────────────────────
function dropBall() {
  if (balance < betAmount) {
    showToast(null, null, 'NOT ENOUGH COINS');
    return;
  }
  balance -= betAmount;
  updateUI();
  activeBalls.push(new Ball(betAmount));
}

function setBet(v) {
  betAmount = Math.min(v, balance);
  document.getElementById('betInput').value = betAmount;
}

function modBet(mult) {
  betAmount = Math.max(1, Math.min(Math.floor(betAmount * mult), balance));
  document.getElementById('betInput').value = betAmount;
}

function setBetMax() {
  betAmount = balance;
  document.getElementById('betInput').value = betAmount;
}

document.getElementById('betInput').addEventListener('input', function() {
  betAmount = Math.max(1, parseInt(this.value) || 1);
});

function onRowsChange() {
  numRows = parseInt(document.getElementById('rowsSlider').value);
  document.getElementById('rowsVal').textContent = numRows;
  buildPegs();
}

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('autoToggle').classList.toggle('on', autoMode);
  if (autoMode) {
    autoTimer = setInterval(() => {
      if (balance >= betAmount) dropBall();
      else { autoMode = false; document.getElementById('autoToggle').classList.remove('on'); clearInterval(autoTimer); }
    }, 900);
  } else {
    clearInterval(autoTimer);
  }
}

// ─── UI UPDATE ───────────────────────────────────────────────────
function updateUI() {
  document.getElementById('balanceDisplay').textContent = balance.toLocaleString();
  document.getElementById('statDrops').textContent = stats.drops;
  document.getElementById('statWinRate').textContent = stats.drops ? Math.round(stats.wins / stats.drops * 100) + '%' : '0%';
  document.getElementById('statBest').textContent = stats.bestMult ? stats.bestMult + '×' : '—';
  const pl = stats.netPL;
  const plEl = document.getElementById('statPL');
  plEl.textContent = (pl >= 0 ? '+' : '') + pl;
  plEl.style.color = pl >= 0 ? 'var(--green)' : 'var(--red)';

  // History
  const hl = document.getElementById('historyList');
  hl.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="hist-mult">${h.mult}×</span>
      <span class="${h.profit >= 0 ? 'hist-win' : 'hist-loss'}">${h.profit >= 0 ? '+' : ''}${h.profit}</span>
    </div>
  `).join('');
}

function renderMultList() {
  const mults = MULT_TABLES[risk];
  // Count unique mults and their display probability
  const counts = {};
  mults.forEach(m => { counts[m] = (counts[m] || 0) + 1; });
  const unique = [...new Set(mults)].sort((a, b) => b - a);
  const total = mults.length;

  const colors = {
    500: '#dd00dd', 150: '#dd00dd', 100: '#dd00dd',
    50: '#cc6600', 20: '#cc6600',
    10: '#aa8800', 5: '#aa8800',
    3: '#006622', 2: '#006622', 1.5: '#006622', 1: '#006622',
    0.5: '#003388'
  };

  document.getElementById('multList').innerHTML = unique.map(m => {
    const pct = Math.round(counts[m] / total * 100);
    const col = colors[m] || '#444';
    return `
      <div class="mult-item">
        <span style="color:var(--accent);min-width:40px">${m}×</span>
        <div class="mult-bar-wrap"><div class="mult-bar" style="width:${pct * 3}%;background:${col}"></div></div>
        <span style="color:var(--dim);font-size:0.65rem">${pct}%</span>
      </div>`;
  }).join('');
}

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer = null;
function showToast(mult, profit, msg) {
  const t = document.getElementById('toast');
  if (msg) {
    t.textContent = msg;
    t.style.borderColor = 'var(--red)';
    t.style.color = 'var(--red)';
  } else {
    const p = profit >= 0;
    t.textContent = `${mult}×  ${p ? '+' : ''}${profit}`;
    t.style.borderColor = p ? 'var(--green)' : 'var(--red)';
    t.style.color = p ? 'var(--green)' : 'var(--red)';
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── INIT ────────────────────────────────────────────────────────
buildPegs();
renderMultList();
updateUI();
drawFrame();

// Resume audio context on first click (browser policy)
document.addEventListener('click', () => { getAudioCtx(); }, { once: true });
</script>
