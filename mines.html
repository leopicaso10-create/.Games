<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova Consilia GAMES - Mines</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-deep: #0a0c10;
    --bg-card: #111419;
    --bg-panel: #13161d;
    --bg-tile: #1a1f2e;
    --bg-tile-hover: #212840;
    --border: #1e2535;
    --border-bright: #2a3350;
    --pink: #ff2d8e;
    --pink-glow: rgba(255,45,142,0.35);
    --pink-dim: #c4206c;
    --gold: #f0b429;
    --gold-glow: rgba(240,180,41,0.3);
    --gem: #00e5ff;
    --gem-glow: rgba(0,229,255,0.4);
    --mine: #ff3b3b;
    --mine-glow: rgba(255,59,59,0.4);
    --green: #00e676;
    --green-glow: rgba(0,230,118,0.3);
    --text-primary: #e8eaf6;
    --text-secondary: #7986a3;
    --text-dim: #3d4a6b;
    --multiplier: #a78bfa;
    --multiplier-glow: rgba(167,139,250,0.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,45,142,0.06) 0%, transparent 70%),
      linear-gradient(180deg, #0a0c10 0%, #070810 100%);
  }
  .brand-bar {
    width: 100%;
    text-align: center;
    padding: 18px 0 10px;
    background: linear-gradient(180deg, rgba(255,45,142,0.07) 0%, transparent 100%);
    border-bottom: 1px solid rgba(255,45,142,0.18);
    margin-bottom: 6px;
  }
  .brand-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.45rem;
    font-weight: 900;
    color: var(--pink);
    letter-spacing: 0.18em;
    text-shadow: 0 0 18px var(--pink-glow), 0 0 40px rgba(255,45,142,0.15);
  }
  .brand-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: rgba(255,45,142,0.45);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .top-bar {
    width: 100%;
    max-width: 1020px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    margin-bottom: 4px;
  }
  .balance-display {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 8px 16px;
  }
  .balance-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .balance-amount {
    font-family: 'Orbitron', monospace;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 10px var(--gold-glow);
  }
  .coin-icon {
    width: 18px; height: 18px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    font-weight: 900;
    color: #1a1000;
    box-shadow: 0 0 8px var(--gold-glow);
  }
  .net-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .net-tag.positive { color: var(--green); border-color: rgba(0,230,118,0.2); background: rgba(0,230,118,0.04); }
  .net-tag.negative { color: var(--mine); border-color: rgba(255,59,59,0.2); background: rgba(255,59,59,0.04); }
  .net-tag.neutral { color: var(--text-secondary); }
  .game-wrap {
    width: 100%;
    max-width: 1020px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 14px;
    padding: 0 14px 14px;
  }
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.015);
  }
  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 6px var(--pink); }
  .control-body { padding: 14px; display: flex; flex-direction: column; gap: 11px; }
  .field-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field-row { display: flex; align-items: center; gap: 6px; }
  .input-box {
    background: var(--bg-tile);
    border: 1px solid var(--border-bright);
    border-radius: 7px;
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus { border-color: var(--pink); box-shadow: 0 0 0 2px rgba(255,45,142,0.12); }
  .input-box:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-small {
    background: var(--bg-tile);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    color: var(--text-secondary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 6px 9px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .btn-small:hover:not(:disabled) { background: var(--border-bright); color: var(--text-primary); }
  .btn-small:disabled { opacity: 0.35; cursor: not-allowed; }
  .mine-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .mine-btn {
    background: var(--bg-tile);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    padding: 6px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .mine-btn:hover:not(.active):not(:disabled) { border-color: var(--border-bright); color: var(--text-primary); }
  .mine-btn.active { background: rgba(255,45,142,0.1); border-color: var(--pink); color: var(--pink); box-shadow: 0 0 8px rgba(255,45,142,0.15); }
  .mine-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .custom-mine-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .divider { height: 1px; background: var(--border); margin: 2px 0; }
  .btn-main {
    width: 100%;
    padding: 12px;
    border-radius: 9px;
    border: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-main::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
  }
  .btn-start {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-dim) 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,45,142,0.35);
  }
  .btn-start:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,45,142,0.5); }
  .btn-start:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-cashout {
    background: linear-gradient(135deg, #00c853 0%, #00962e 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,200,83,0.35);
    display: none;
  }
  .btn-cashout:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,200,83,0.5); }
  .btn-cashout.visible { display: block; }
  .multiplier-display {
    background: var(--bg-tile);
    border: 1px solid var(--border-bright);
    border-radius: 9px;
    padding: 10px 14px;
    text-align: center;
  }
  .mult-label { font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; }
  .mult-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--multiplier);
    text-shadow: 0 0 16px var(--multiplier-glow);
    transition: all 0.3s;
    line-height: 1;
  }
  .mult-value.pumped { animation: multPump 0.35s ease; }
  @keyframes multPump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }
  .potential-win {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: var(--gold);
    text-align: center;
    margin-top: 4px;
  }
  .payout-table { max-height: 220px; overflow-y: auto; }
  .payout-table::-webkit-scrollbar { width: 3px; }
  .payout-table::-webkit-scrollbar-track { background: transparent; }
  .payout-table::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
  .payout-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 14px;
    border-bottom: 1px solid rgba(30,37,53,0.5);
    transition: background 0.15s;
  }
  .payout-row:last-child { border-bottom: none; }
  .payout-row.current { background: rgba(167,139,250,0.07); }
  .payout-row.revealed { background: rgba(0,229,255,0.04); }
  .payout-step { font-size: 0.72rem; color: var(--text-secondary); font-family: 'Share Tech Mono', monospace; }
  .payout-step.done { color: var(--gem); }
  .payout-mult { font-size: 0.8rem; color: var(--multiplier); font-family: 'Share Tech Mono', monospace; font-weight: 600; }
  .payout-coins { font-size: 0.72rem; color: var(--gold); font-family: 'Share Tech Mono', monospace; }
  .game-area {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .game-info-group { display: flex; gap: 20px; align-items: center; }
  .info-item { text-align: center; }
  .info-val {
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1;
  }
  .info-val.gem-col { color: var(--gem); text-shadow: 0 0 8px var(--gem-glow); }
  .info-val.mine-col { color: var(--mine); text-shadow: 0 0 8px var(--mine-glow); }
  .info-lbl { font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
  .history-dots { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }
  .h-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .h-dot.win { background: var(--green); box-shadow: 0 0 5px var(--green-glow); }
  .h-dot.loss { background: var(--mine); box-shadow: 0 0 5px var(--mine-glow); }
  .h-dot.cashout { background: var(--gold); box-shadow: 0 0 5px var(--gold-glow); }
  .grid-wrapper {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mines-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }
  .tile {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .tile-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    border-radius: 10px;
  }
  .tile.flipped .tile-inner { transform: rotateY(180deg); }
  .tile-front, .tile-back {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .tile-front {
    background: linear-gradient(145deg, var(--bg-tile) 0%, #151929 100%);
    border: 1px solid var(--border-bright);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .tile:not(.flipped):not(.dead) .tile-front:hover {
    background: linear-gradient(145deg, var(--bg-tile-hover) 0%, #1c2140 100%);
    border-color: rgba(255,45,142,0.35);
    box-shadow: 0 0 14px rgba(255,45,142,0.12);
  }
  .tile.dead .tile-front { cursor: not-allowed; opacity: 0.5; }
  .tile-front-icon {
    width: 38%;
    opacity: 0.18;
  }
  .tile-back { transform: rotateY(180deg); }
  .tile-back.gem {
    background: linear-gradient(145deg, #0d2a34 0%, #051e28 100%);
    border: 1px solid rgba(0,229,255,0.35);
    box-shadow: 0 0 18px rgba(0,229,255,0.15), inset 0 0 20px rgba(0,229,255,0.06);
  }
  .tile-back.mine {
    background: linear-gradient(145deg, #2a0d0d 0%, #1a0505 100%);
    border: 1px solid rgba(255,59,59,0.35);
    box-shadow: 0 0 18px rgba(255,59,59,0.25), inset 0 0 20px rgba(255,59,59,0.08);
    animation: mineShake 0.4s ease;
  }
  @keyframes mineShake {
    0%,100%{transform:rotateY(180deg) translateX(0)}
    20%{transform:rotateY(180deg) translateX(-4px)}
    40%{transform:rotateY(180deg) translateX(4px)}
    60%{transform:rotateY(180deg) translateX(-3px)}
    80%{transform:rotateY(180deg) translateX(3px)}
  }
  .gem-svg { width: 48%; filter: drop-shadow(0 0 8px var(--gem)); }
  .mine-svg { width: 48%; filter: drop-shadow(0 0 8px var(--mine)); }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,8,16,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(6px);
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .result-card {
    background: var(--bg-card);
    border-radius: 18px;
    padding: 32px 40px;
    text-align: center;
    min-width: 320px;
    border: 1px solid var(--border-bright);
    transform: translateY(20px) scale(0.96);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .overlay.show .result-card { transform: translateY(0) scale(1); }
  .result-emoji-area { font-size: 3rem; margin-bottom: 8px; }
  .result-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .result-title.win { color: var(--green); text-shadow: 0 0 20px var(--green-glow); }
  .result-title.loss { color: var(--mine); text-shadow: 0 0 20px var(--mine-glow); }
  .result-title.cashout { color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); }
  .result-sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 18px; }
  .result-amount {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .result-details { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 24px; }
  .btn-play-again {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-dim) 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 18px rgba(255,45,142,0.35);
  }
  .btn-play-again:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,45,142,0.5); }
  .bottom-bar {
    width: 100%;
    max-width: 1020px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 20px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .result-icon-win { font-size: 3.5rem; color: var(--green); text-shadow: 0 0 20px var(--green-glow); }
  .result-icon-loss { font-size: 3.5rem; color: var(--mine); text-shadow: 0 0 20px var(--mine-glow); }
  .result-icon-cashout { font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); }
  .status-bar {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 14px;
    display: flex;
    gap: 18px;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.73rem;
  }
  .stat-item { display: flex; gap: 6px; align-items: center; }
  .stat-lbl { color: var(--text-dim); }
  .stat-val { color: var(--text-secondary); }
  .stat-val.gn { color: var(--green); }
  .stat-val.rd { color: var(--mine); }
  .sound-btn {
    background: var(--bg-tile);
    border: 1px solid var(--border-bright);
    border-radius: 7px;
    color: var(--text-secondary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.08em;
  }
  .sound-btn:hover { border-color: var(--pink); color: var(--pink); }
  .sound-btn.muted { opacity: 0.5; }
  @media (max-width: 700px) {
    .game-wrap { grid-template-columns: 1fr; }
    .brand-name { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="brand-bar">
  <div class="brand-name">Nova Consilia GAMES</div>
  <div class="brand-sub">Provably Fair . In-Game Currency . Mines</div>
</div>

<div class="top-bar">
  <div class="balance-display">
    <span class="coin-icon">C</span>
    <span class="balance-label">Balance</span>
    <span class="balance-amount" id="balanceDisplay">1,000</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="net-tag neutral" id="netTag">NET: +0</div>
    <button class="sound-btn" id="soundToggle" onclick="toggleSound()">SFX: ON</button>
  </div>
</div>

<div class="game-wrap">
  <!-- LEFT PANEL -->
  <div style="display:flex;flex-direction:column;gap:12px;">

    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>
        <span class="panel-title">Controls</span>
      </div>
      <div class="control-body">

        <div>
          <div class="field-label">Bet Amount</div>
          <div class="field-row">
            <input class="input-box" id="betInput" type="number" value="50" min="1"/>
          </div>
          <div class="field-row" style="margin-top:6px;">
            <button class="btn-small" id="btnHalf" onclick="adjustBet(0.5)">1/2x</button>
            <button class="btn-small" id="btnDouble" onclick="adjustBet(2)">2x</button>
            <button class="btn-small" id="btnMin" onclick="setBet(1)">Min</button>
            <button class="btn-small" id="btnMax" onclick="setBetMax()">Max</button>
          </div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="field-label">Mines Count</div>
          <div class="mine-selector" id="mineSelector">
            <button class="mine-btn active" onclick="setMines(1,this)">1</button>
            <button class="mine-btn" onclick="setMines(3,this)">3</button>
            <button class="mine-btn" onclick="setMines(5,this)">5</button>
            <button class="mine-btn" onclick="setMines(10,this)">10</button>
            <button class="mine-btn" onclick="setMines(15,this)">15</button>
            <button class="mine-btn" onclick="setMines(20,this)">20</button>
            <button class="mine-btn" onclick="setMines(24,this)">24</button>
          </div>
          <div class="custom-mine-row" style="margin-top:6px;">
            <input class="input-box" id="customMineInput" type="number" min="1" max="24" placeholder="Custom" style="font-size:0.8rem;padding:6px 10px;" oninput="customMinesChange()"/>
          </div>
        </div>

        <div class="divider"></div>

        <div class="multiplier-display">
          <div class="mult-label">Current Multiplier</div>
          <div class="mult-value" id="multDisplay">1.00x</div>
          <div class="potential-win" id="potentialWin">Potential: 0 coins</div>
        </div>

        <button class="btn-main btn-start" id="btnStart" onclick="startGame()">PLACE BET</button>
        <button class="btn-main btn-cashout" id="btnCashout" onclick="cashOut()">CASH OUT</button>

      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:var(--gold);box-shadow:0 0 6px var(--gold);"></div>

<div class="overlay" id="resultOverlay">

<script>
// ===================== AUDIO ENGINE =====================
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundEnabled ? 'SFX: ON' : 'SFX: OFF';
  btn.classList.toggle('muted', !soundEnabled);
  if (soundEnabled) playSound('click');
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();

    switch(type) {
      case 'click': playSynthClick(ctx); break;
      case 'gem': playSynthGem(ctx); break;
      case 'mine': playSynthMine(ctx); break;
      case 'cashout': playSynthCashout(ctx); break;
      case 'win': playSynthWin(ctx); break;
      case 'bet': playSynthBet(ctx); break;
      case 'multup': playSynthMultUp(ctx); break;
    }
  } catch(e) {}
}

// Short UI click
function playSynthClick(ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.07);
}

// Bet placement - punchy low thud
function playSynthBet(ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.28, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.15);
}

// Gem reveal - bright crystal chime
function playSynthGem(ctx) {
  const freqs = [880, 1108, 1320];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.04);
    gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.04);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.04 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.04 + 0.4);
    osc.start(ctx.currentTime + i * 0.04);
    osc.stop(ctx.currentTime + i * 0.04 + 0.4);
  });
}

// Multiplier tick up - small bright ping
function playSynthMultUp(ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.12);
}

// Mine explosion - noise burst + low boom
function playSynthMine(ctx) {
  // Noise burst
  const bufferSize = ctx.sampleRate * 0.6;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const noiseGain = ctx.createGain();
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.setValueAtTime(800, ctx.currentTime);
  noiseFilter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
  noiseGain.gain.setValueAtTime(0.5, ctx.currentTime);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  noise.start(ctx.currentTime);
  noise.stop(ctx.currentTime + 0.6);

  // Low boom
  const osc = ctx.createOscillator();
  const boomGain = ctx.createGain();
  osc.connect(boomGain); boomGain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.35);
  boomGain.gain.setValueAtTime(0.45, ctx.currentTime);
  boomGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.35);
}

// Cash out - ascending arpeggio
function playSynthCashout(ctx) {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
    gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.1 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.35);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.35);
  });
}

// Full win (all gems) - triumphant fanfare
function playSynthWin(ctx) {
  const melody = [523, 659, 784, 659, 1047, 1047];
  const delays = [0, 0.1, 0.2, 0.3, 0.45, 0.6];
  melody.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 2000;
    osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(f, ctx.currentTime + delays[i]);
    gain.gain.setValueAtTime(0, ctx.currentTime + delays[i]);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + delays[i] + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delays[i] + 0.28);
    osc.start(ctx.currentTime + delays[i]);
    osc.stop(ctx.currentTime + delays[i] + 0.3);
  });
}
// ===================== END AUDIO =====================

// ===================== GAME STATE =====================
let balance = parseInt(localStorage.getItem('ncg_balance')) || 1000;
let netProfit = parseInt(localStorage.getItem('ncg_net')) || 0;
let mineCount = 1;
let betAmount = 50;
let gameActive = false;
let minePositions = [];
let revealedTiles = [];
let totalSafe = 0;
let stats = JSON.parse(localStorage.getItem('ncg_stats')) || {wins:0,losses:0,games:0};
let history = JSON.parse(localStorage.getItem('ncg_history')) || [];
let currentSeed = '';

function saveState() {
  localStorage.setItem('ncg_balance', balance);
  localStorage.setItem('ncg_net', netProfit);
  localStorage.setItem('ncg_stats', JSON.stringify(stats));
  localStorage.setItem('ncg_history', JSON.stringify(history.slice(-30)));
}

// ===================== MULTIPLIER MATH =====================
// Uses combinatorial probability: P(safe) = C(safe,r) / C(25,r)
// Multiplier = (1/probability) * (1 - houseEdge)
function calcMultiplier(revealed, mines) {
  if (revealed === 0) return 1.0;
  const safe = 25 - mines;
  if (safe <= 0) return 1.0;
  const houseEdge = 0.01;
  let prob = 1.0;
  for (let i = 0; i < revealed; i++) {
    prob *= (safe - i) / (25 - i);
  }
  if (prob <= 0) return 99999;
  return (1 / prob) * (1 - houseEdge);
}

// ===================== UI HELPERS =====================
function formatNum(n) { return n.toLocaleString('en-US', {maximumFractionDigits:2}); }
function formatCoins(n) { return Math.floor(n).toLocaleString(); }

function updateBalanceUI() {
  document.getElementById('balanceDisplay').textContent = formatCoins(balance);
  const netEl = document.getElementById('netTag');
  netEl.textContent = 'NET: ' + (netProfit >= 0 ? '+' : '') + formatCoins(netProfit);
  netEl.className = 'net-tag ' + (netProfit > 0 ? 'positive' : netProfit < 0 ? 'negative' : 'neutral');
}

function updateMultUI() {
  const revealed = revealedTiles.length;
  const mult = calcMultiplier(revealed, mineCount);
  const potential = Math.floor(betAmount * mult);
  const el = document.getElementById('multDisplay');
  el.textContent = mult.toFixed(2) + 'x';
  el.classList.remove('pumped');
  void el.offsetWidth;
  el.classList.add('pumped');
  document.getElementById('potentialWin').textContent = 'Potential: ' + formatCoins(potential) + ' coins';
}

function updateInfoUI() {
  const safe = 25 - mineCount;
  document.getElementById('gemsLeft').textContent = safe - revealedTiles.length;
  document.getElementById('mineCount').textContent = mineCount;
  document.getElementById('revealedCount').textContent = revealedTiles.length;
}

function buildPayoutTable() {
  const safe = 25 - mineCount;
  const table = document.getElementById('payoutTable');
  table.innerHTML = '';
  for (let r = 1; r <= safe; r++) {
    const mult = calcMultiplier(r, mineCount);
    const coins = Math.floor(betAmount * mult);
    const row = document.createElement('div');
    row.className = 'payout-row';
    row.id = 'prow_' + r;
    if (revealedTiles.length === r) row.classList.add('current');
    else if (revealedTiles.length > r) row.classList.add('revealed');
    row.innerHTML = `
      <span class="payout-step${revealedTiles.length >= r?' done':''}">${r} gem${r>1?'s':''}</span>
      <span class="payout-mult">${mult.toFixed(2)}x</span>
      <span class="payout-coins">${formatCoins(coins)}</span>
    `;
    table.appendChild(row);
  }
}

function updatePayoutHighlight() {
  buildPayoutTable();
  // Scroll to current
  const cur = document.getElementById('prow_' + revealedTiles.length);
  if (cur) cur.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function updateHistoryDots() {
  const el = document.getElementById('historyDots');
  el.innerHTML = '';
  const recent = history.slice(-20);
  recent.forEach(h => {
    const d = document.createElement('div');
    d.className = 'h-dot ' + h;
    el.appendChild(d);
  });
}

function updateStats() {
  document.getElementById('statWins').textContent = stats.wins;
  document.getElementById('statLosses').textContent = stats.losses;
  document.getElementById('statGames').textContent = stats.games;
}

// ===================== MINE SETUP =====================
function generateMines() {
  const positions = new Set();
  while (positions.size < mineCount) {
    positions.add(Math.floor(Math.random() * 25));
  }
  return [...positions];
}

function buildGrid(disabled) {
  const grid = document.getElementById('minesGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile' + (disabled ? ' dead' : '');
    tile.id = 'tile_' + i;
    tile.innerHTML = `
      <div class="tile-inner">
        <div class="tile-front">
          <svg class="tile-front-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" stroke="#7986a3" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div class="tile-back"></div>
      </div>`;
    if (!disabled) {
      tile.addEventListener('click', () => { playSound('click'); revealTile(i); });
    }
    grid.appendChild(tile);
  }
}

function revealTileVisual(index, type) {
  const tile = document.getElementById('tile_' + index);
  if (!tile) return;
  const back = tile.querySelector('.tile-back');
  if (type === 'gem') {
    back.className = 'tile-back gem';
    back.innerHTML = `<svg class="gem-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="32,4 58,22 48,58 16,58 6,22" fill="rgba(0,229,255,0.15)" stroke="#00e5ff" stroke-width="2"/>
      <polygon points="32,4 58,22 32,20" fill="rgba(0,229,255,0.25)" stroke="#00e5ff" stroke-width="1"/>
      <polygon points="6,22 32,20 16,58" fill="rgba(0,229,255,0.12)" stroke="#00e5ff" stroke-width="1"/>
      <line x1="32" y1="4" x2="32" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    </svg>`;
  } else {
    back.className = 'tile-back mine';
    back.innerHTML = `<svg class="mine-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="14" fill="rgba(255,59,59,0.2)" stroke="#ff3b3b" stroke-width="2"/>
      <circle cx="32" cy="32" r="7" fill="rgba(255,59,59,0.5)"/>
      <line x1="32" y1="10" x2="32" y2="4" stroke="#ff3b3b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="54" x2="32" y2="60" stroke="#ff3b3b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="32" x2="4" y2="32" stroke="#ff3b3b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="54" y1="32" x2="60" y2="32" stroke="#ff3b3b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="17" y1="17" x2="12" y2="12" stroke="#ff3b3b" stroke-width="2" stroke-linecap="round"/>
      <line x1="47" y1="17" x2="52" y2="12" stroke="#ff3b3b" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="47" x2="12" y2="52" stroke="#ff3b3b" stroke-width="2" stroke-linecap="round"/>
      <line x1="47" y1="47" x2="52" y2="52" stroke="#ff3b3b" stroke-width="2" stroke-linecap="round"/>
    </svg>`;
  }
  tile.classList.add('flipped');
  tile.classList.add('dead');
}

function revealAllMines() {
  minePositions.forEach((idx, i) => {
    if (!revealedTiles.includes(idx)) {
      setTimeout(() => {
        revealTileVisual(idx, 'mine');
      }, i * 80);
    }
  });
}

// ===================== GAME LOGIC =====================
function revealTile(index) {
  if (!gameActive) return;
  if (revealedTiles.includes(index)) return;

  if (minePositions.includes(index)) {
    // HIT A MINE
    playSound('mine');
    revealTileVisual(index, 'mine');
    gameActive = false;
    revealedTiles.push(index);

    setTimeout(() => {
      revealAllMines();
    }, 300);

    balance -= betAmount;
    netProfit -= betAmount;
    stats.losses++;
    stats.games++;
    history.push('loss');
    saveState();
    updateBalanceUI();
    updateStats();
    updateHistoryDots();

    setTimeout(() => showResult('loss', 0), 900);
    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnCashout').classList.remove('visible');
    setControlsDisabled(false);

  } else {
    // SAFE TILE
    revealedTiles.push(index);
    revealTileVisual(index, 'gem');
    playSound('gem');

    setTimeout(() => {
      playSound('multup');
      updateMultUI();
      updateInfoUI();
      updatePayoutHighlight();
    }, 180);

    const safe = 25 - mineCount;
    if (revealedTiles.length === safe) {
      // ALL SAFE TILES REVEALED - Auto win!
      playSound('win');
      gameActive = false;
      const mult = calcMultiplier(revealedTiles.length, mineCount);
      const winAmount = Math.floor(betAmount * mult);
      balance += winAmount;
      netProfit += winAmount - betAmount;
      stats.wins++;
      stats.games++;
      history.push('win');
      saveState();
      updateBalanceUI();
      updateStats();
      updateHistoryDots();
      setTimeout(() => showResult('win', winAmount, mult), 500);
      document.getElementById('btnStart').style.display = 'block';
      document.getElementById('btnCashout').classList.remove('visible');
      setControlsDisabled(false);
    }
  }
}

function startGame() {
  betAmount = Math.max(1, parseInt(document.getElementById('betInput').value) || 50);
  if (betAmount > balance) { shakeEl('betInput'); return; }
  if (balance <= 0) { alert('Out of coins! Refresh to reset.'); return; }

  playSound('bet');

  minePositions = generateMines();
  revealedTiles = [];
  gameActive = true;
  currentSeed = Math.random().toString(36).substr(2,10).toUpperCase();
  document.getElementById('rngSeed').textContent = 'SEED: ' + currentSeed;

  buildGrid(false);
  updateMultUI();
  updateInfoUI();
  buildPayoutTable();

  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnCashout').classList.add('visible');
  setControlsDisabled(true);
}

function cashOut() {
  if (!gameActive || revealedTiles.length === 0) return;
  playSound('cashout');
  gameActive = false;

  const mult = calcMultiplier(revealedTiles.length, mineCount);
  const winAmount = Math.floor(betAmount * mult);
  balance += winAmount;
  netProfit += winAmount - betAmount;
  stats.wins++;
  stats.games++;
  history.push('cashout');
  saveState();
  updateBalanceUI();
  updateStats();
  updateHistoryDots();
  revealAllMines();
  setTimeout(() => showResult('cashout', winAmount, mult), 500);
  document.getElementById('btnStart').style.display = 'block';
  document.getElementById('btnCashout').classList.remove('visible');
  setControlsDisabled(false);
}

function showResult(type, amount, mult) {
  const overlay = document.getElementById('resultOverlay');
  const iconEl = document.getElementById('resultIcon');
  const titleEl = document.getElementById('resultTitle');
  const subEl = document.getElementById('resultSub');
  const amountEl = document.getElementById('resultAmount');
  const detailsEl = document.getElementById('resultDetails');

  if (type === 'loss') {
    iconEl.innerHTML = `<svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(255,59,59,0.12)" stroke="#ff3b3b" stroke-width="2"/><circle cx="32" cy="32" r="10" fill="rgba(255,59,59,0.4)"/><line x1="32" y1="4" x2="32" y2="16" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="48" x2="32" y2="60" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/><line x1="4" y1="32" x2="16" y2="32" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/><line x1="48" y1="32" x2="60" y2="32" stroke="#ff3b3b" stroke-width="3" stroke-linecap="round"/></svg>`;
    titleEl.textContent = 'BOOM!';
    titleEl.className = 'result-title loss';
    subEl.textContent = 'You hit a mine. Better luck next time.';
    amountEl.textContent = '-' + formatCoins(betAmount) + ' coins';
    amountEl.style.color = 'var(--mine)';
    detailsEl.textContent = revealedTiles.length - 1 + ' gem(s) revealed  |  ' + mineCount + ' mines hidden';
  } else if (type === 'win') {
    iconEl.innerHTML = `<svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(0,230,118,0.12)" stroke="#00e676" stroke-width="2"/><polyline points="16,32 26,44 48,20" stroke="#00e676" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
    titleEl.textContent = 'PERFECT RUN!';
    titleEl.className = 'result-title win';
    subEl.textContent = 'All safe tiles revealed! Maximum payout!';
    amountEl.textContent = '+' + formatCoins(amount) + ' coins';
    amountEl.style.color = 'var(--green)';
    detailsEl.textContent = mult.toFixed(2) + 'x multiplier  |  ' + (25-mineCount) + ' gems cleared';
  } else {
    iconEl.innerHTML = `<svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(240,180,41,0.12)" stroke="#f0b429" stroke-width="2"/><polygon points="32,16 36,28 50,28 39,36 43,50 32,42 21,50 25,36 14,28 28,28" fill="rgba(240,180,41,0.3)" stroke="#f0b429" stroke-width="1.5"/></svg>`;
    titleEl.textContent = 'CASHED OUT!';
    titleEl.className = 'result-title cashout';
    subEl.textContent = 'Smart move. Profits secured.';
    amountEl.textContent = '+' + formatCoins(amount) + ' coins';
    amountEl.style.color = 'var(--gold)';
    detailsEl.textContent = mult.toFixed(2) + 'x multiplier  |  ' + revealedTiles.length + ' gems revealed';
  }

  overlay.classList.add('show');
}

function closeResult() {
  playSound('click');
  document.getElementById('resultOverlay').classList.remove('show');
  buildGrid(true);
  revealedTiles = [];
  updateMultUI();
  updateInfoUI();
  buildPayoutTable();
}

// ===================== CONTROLS =====================
function setControlsDisabled(disabled) {
  ['betInput','customMineInput'].forEach(id => document.getElementById(id).disabled = disabled);
  ['btnHalf','btnDouble','btnMin','btnMax'].forEach(id => document.getElementById(id).disabled = disabled);
  document.querySelectorAll('.mine-btn').forEach(b => b.disabled = disabled);
}

function setMines(n, btn) {
  if (gameActive) return;
  playSound('click');
  mineCount = Math.max(1, Math.min(24, n));
  document.querySelectorAll('.mine-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('customMineInput').value = '';
  document.getElementById('mineCount').textContent = mineCount;
  updateMultUI();
  buildPayoutTable();
}

function customMinesChange() {
  const val = parseInt(document.getElementById('customMineInput').value);
  if (val >= 1 && val <= 24) {
    mineCount = val;
    document.querySelectorAll('.mine-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mineCount').textContent = mineCount;
    updateMultUI();
    buildPayoutTable();
  }
}

function adjustBet(factor) {
  if (gameActive) return;
  playSound('click');
  betAmount = Math.max(1, Math.min(balance, Math.round(betAmount * factor)));
  document.getElementById('betInput').value = betAmount;
  buildPayoutTable();
}

function setBet(val) {
  if (gameActive) return;
  playSound('click');
  betAmount = val;
  document.getElementById('betInput').value = val;
  buildPayoutTable();
}

function setBetMax() {
  if (gameActive) return;
  playSound('click');
  betAmount = balance;
  document.getElementById('betInput').value = balance;
  buildPayoutTable();
}

document.getElementById('betInput').addEventListener('change', () => {
  betAmount = Math.max(1, Math.min(balance, parseInt(document.getElementById('betInput').value) || 1));
  document.getElementById('betInput').value = betAmount;
  buildPayoutTable();
});

function shakeEl(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.style.borderColor = 'var(--mine)';
  setTimeout(() => { el.style.borderColor = ''; }, 600);
}

// Reset if balance is zero
if (balance <= 0) {
  balance = 1000;
  saveState();
}

// ===================== INIT =====================
updateBalanceUI();
updateStats();
updateHistoryDots();
buildGrid(true);
updateMultUI();
updateInfoUI();
buildPayoutTable();
</script>
</body>
</html>
